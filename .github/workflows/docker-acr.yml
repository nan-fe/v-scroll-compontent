# ACR：SSH_USER + ALIYUN_PASSWORD（与 docker login 一致）
# SSH 部署（私钥登录服务器）：SSH_HOST、SERVER_USER、SSH_PRIVATE_KEY
# 服务器需在 DEPLOY_DIR clone 本仓库，分支 master，且已安装 docker / docker compose

name: Build and Deploy v-scroll Component

on:
  push:
    branches: ['master']
    tags: ['v*']

env:
  REGISTRY: crpi-qeygpng4u8e2ezh6.cn-shanghai.personal.cr.aliyuncs.com
  NAMESPACE: nan-fe
  IMAGE_NAME: v-scroll-compontent
  DEPLOY_DIR: /root/v-scroll-compontent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH login and deploy on Aliyun server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_DIR }}
            git pull origin master
            echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login --username=${{ secrets.SSH_USER }} --password-stdin ${{ env.REGISTRY }}
            docker compose pull
            docker compose up -d
            docker image prune -f
