# ACR：SSH_USER + ALIYUN_PASSWORD（与 docker login 一致）
# SSH 部署（私钥登录服务器）：SSH_HOST、SERVER_USER、SSH_PRIVATE_KEY
# 服务器需在 DEPLOY_DIR 有本仓库（或手动放 docker-compose.yml）；已安装 docker compose
# 容器内 Nginx 固定 listen 80；宿主机 4000:80。勿在容器内改 listen 4000，否则与 compose 不一致

name: Build and Deploy v-scroll Component

on:
  push:
    branches: ['main']
    tags: ['v*']

env:
  REGISTRY: crpi-qeygpng4u8e2ezh6.cn-shanghai.personal.cr.aliyuncs.com
  NAMESPACE: nan-fe
  IMAGE_NAME: v-scroll-compontent
  DEPLOY_DIR: /root/v-scroll-compontent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-image:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Pull and smoke test (nginx must listen on 80)
        env:
          IMAGE_SHA: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          set -euo pipefail
          docker pull "$IMAGE_SHA"
          docker rm -f vscroll_smoke 2>/dev/null || true
          docker run -d --name vscroll_smoke -p 18080:80 "$IMAGE_SHA"
          sleep 2
          code="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 5 http://127.0.0.1:18080/)"
          test "$code" = "200"
          docker rm -f vscroll_smoke
          echo ">>> verify-image: HTTP $code OK"

  deploy:
    runs-on: ubuntu-latest
    needs: verify-image
    steps:
      - name: SSH login and deploy on Aliyun server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_DIR }}
            if [ -d .git ]; then
              git pull origin ${{ github.event.repository.default_branch }} || echo ">>> deploy: git pull failed, using existing files (sync docker-compose.yml if needed)"
            fi
            echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login --username=${{ secrets.SSH_USER }} --password-stdin ${{ env.REGISTRY }}
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
